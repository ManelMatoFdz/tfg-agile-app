server:
  port: ${PROJECT_SERVICE_PORT:8082}

spring:
  application:
    name: project-service

  datasource:
    url: jdbc:postgresql://${PROJECT_DB_HOST:localhost}:${PROJECT_DB_PORT:5434}/${PROJECT_DB_NAME}
    username: ${PROJECT_DB_USER}
    password: ${PROJECT_DB_PASS}

  jpa:
    hibernate:
      ddl-auto: ${PROJECT_SERVICE_JPA_DDL_AUTO:update}
