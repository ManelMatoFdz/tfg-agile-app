server:
  port: ${TASK_SERVICE_PORT:8083}

spring:
  application:
    name: task-service

  datasource:
    url: jdbc:postgresql://${TASK_DB_HOST:localhost}:${TASK_DB_PORT:5435}/${TASK_DB_NAME:taskdb}
    username: ${TASK_DB_USER:task}
    password: ${TASK_DB_PASS:task}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${TASK_SERVICE_JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  internal:
    api-key: ${INTERNAL_API_KEY:dev-internal-key}
  project-service:
    url: ${PROJECT_SERVICE_URL:http://localhost:8082}

security:
  jwt:
    secret: ${JWT_SECRET:replace-with-a-long-random-secret-min-32-bytes}
    issuer: ${JWT_ISSUER:agileflow-user-service}
    audience: ${JWT_AUDIENCE:agileflow-api}