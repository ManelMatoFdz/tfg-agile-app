server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service

  servlet:
    multipart:
      max-file-size: ${USER_SERVICE_MAX_FILE_SIZE:5MB}
      max-request-size: ${USER_SERVICE_MAX_REQUEST_SIZE:5MB}

  datasource:
    url: jdbc:postgresql://${USER_DB_HOST:localhost}:${USER_DB_PORT:5433}/${USER_DB_NAME}
    username: ${USER_DB_USER}
    password: ${USER_DB_PASS}

  jpa:
    hibernate:
      ddl-auto: ${USER_SERVICE_JPA_DDL_AUTO:update}

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

app:
  internal:
    api-key: ${INTERNAL_API_KEY:dev-internal-key}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@agileflow.local}
  avatar:
    public-base-url: ${AVATAR_PUBLIC_BASE_URL:http://localhost:8081/assets/avatars}
  notifications:
    queue:
      enabled: ${NOTIFICATIONS_QUEUE_ENABLED:false}
      name: ${NOTIFICATIONS_QUEUE_NAME:user-service.notifications}
      exchange: ${NOTIFICATIONS_EXCHANGE:agileflow.notifications}
      routing-key: ${NOTIFICATIONS_ROUTING_KEY:user-service.notification}

security:
  jwt:
    secret: ${JWT_SECRET}
    expirationMinutes: ${JWT_EXPIRATION_MINUTES:60}
    issuer: ${JWT_ISSUER:agileflow-user-service}
    audience: ${JWT_AUDIENCE:agileflow-api}
  refresh-token:
    expirationDays: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}
  reset-password:
    expirationMinutes: ${RESET_PASSWORD_EXPIRATION_MINUTES:15}
    base-url: ${RESET_PASSWORD_BASE_URL:http://localhost:3000/reset-password}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    token-info-url: ${GOOGLE_TOKEN_INFO_URL:https://oauth2.googleapis.com/tokeninfo}
